[theme]
base = "light"
primaryColor = "#F2A900"
backgroundColor = "#FFFDF6"
secondaryBackgroundColor = "#FFF8E1"
textColor = "#2B2A26"
font = "sans serif"

[server]
maxUploadSize = 50
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
